<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>juppijo — Repository Index</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── HEADER ────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-left">
      <div class="avatar-wrap">
        <img id="avatar" src="https://avatars.githubusercontent.com/u/82041071?v=4" alt="juppijo avatar" />
        <span class="avatar-ring"></span>
      </div>
      <div class="header-info">
        <h1 class="site-title">juppijo</h1>
        <p class="site-sub">Debey Joseph &mdash; GitHub Repository Index</p>
      </div>
    </div>

    <nav class="header-controls">
      <a class="ctrl-btn" id="gh-link" href="https://github.com/juppijo" target="_blank" title="GitHub Profil öffnen">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.154-1.11-1.461-1.11-1.461-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.742 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      </a>
      <button class="ctrl-btn" id="theme-btn" title="Theme wechseln">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="ctrl-btn" id="fullscreen-btn" title="Vollbild">
        <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <svg class="icon-compress" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
      </button>
    </nav>
  </header>

  <!-- ── STATS BAR ──────────────────────────────────── -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item">
      <span class="stat-label">Repositories</span>
      <span class="stat-value" id="stat-repos">…</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">Dateien geladen</span>
      <span class="stat-value" id="stat-files">0</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">Sprachen</span>
      <span class="stat-value" id="stat-langs">…</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Suchen…" autocomplete="off" />
    </div>
  </div>

  <!-- ── MAIN LAYOUT ───────────────────────────────── -->
  <main class="layout">

    <!-- Sidebar: Repo List -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">REPOSITORIES</span>
        <button class="expand-all-btn" id="expand-all-btn" title="Alle auf-/zuklappen">⊞</button>
      </div>
      <ul class="repo-list" id="repo-list">
        <!-- filled by JS -->
      </ul>
    </aside>

    <!-- Content: File Tree -->
    <section class="content" id="content">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-art">
          <svg viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="10" width="100" height="60" rx="6" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/>
            <circle cx="20" cy="20" r="3" fill="var(--accent)"/>
            <circle cx="30" cy="20" r="3" fill="var(--accent-2)"/>
            <circle cx="40" cy="20" r="3" fill="var(--muted)"/>
            <line x1="10" y1="28" x2="110" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
            <rect x="18" y="36" width="40" height="4" rx="2" fill="var(--accent)" opacity="0.6"/>
            <rect x="18" y="46" width="60" height="3" rx="1.5" fill="currentColor" opacity="0.2"/>
            <rect x="18" y="53" width="50" height="3" rx="1.5" fill="currentColor" opacity="0.2"/>
            <rect x="18" y="60" width="30" height="3" rx="1.5" fill="currentColor" opacity="0.15"/>
          </svg>
        </div>
        <p class="welcome-hint">← Wähle ein Repository aus der Liste</p>
        <p class="welcome-sub">Klicke auf den Pfeil zum Aufklappen des Dateibaums</p>
      </div>

      <div class="file-panel" id="file-panel" style="display:none">
        <div class="panel-header" id="panel-header">
          <!-- breadcrumb injected here -->
        </div>
        <div class="file-tree-wrap" id="file-tree-wrap">
          <!-- tree injected here -->
        </div>
      </div>
    </section>

  </main>

  <!-- ── LOADING OVERLAY ──────────────────────────── -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loader-inner">
      <div class="loader-ring"></div>
      <span class="loader-text">Lade Repositories…</span>
    </div>
  </div>

  <!-- ── ERROR TOAST ───────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
