<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaminia Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-brand">
      <img src="bild.jpg" alt="Zaminia Portrait" class="header-img">

      
      <div class="header-titles">
        <h1>Zaminia Home</h1>
        <p>Willkommen in Zami's Welt</p>
      </div>
      <div class="header-logo">🌐</div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-fullscreen" title="Vollbild">⛶</button>
      <button class="ctrl-btn" id="btn-sound" title="Musik an/aus">🔇</button>
      <button class="ctrl-btn" id="btn-dark" title="Farbmodus">🌙</button>
      <button class="ctrl-btn" id="btn-settings" title="Farbeinstellungen">⚙️</button>
    </div>
  </header>

  <aside class="settings-panel" id="settings-panel">
    <div class="settings-header">
      <h3>Farbeinstellungen</h3>
      <button id="close-settings">✕</button>
    </div>
    <div class="setting-group">
      <label>Grundfarbe: <span id="hue-value">180°</span></label>
      <input type="range" id="hue-slider" min="0" max="360" value="180">
    </div>
    <div class="color-palette">
      <div class="color-swatch" id="sw-primary" title="Primär"></div>
      <div class="color-swatch" id="sw-comp" title="Komplementär"></div>
      <div class="color-swatch" id="sw-triad" title="Triade"></div>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <section class="hero">
    <span class="hero-emoji">🌍</span>
    <h2>Willkommen in Zami's Welt</h2>
    <p>Ein Ort der Ruhe, inspiriert von Shambala Luminia.</p>
    <div class="color-bar"></div>
  </section>

  <main>
    <div class="grid" id="categories-grid"></div>
  </main>

  <audio id="bg-music" src="Hintergrung.mp3" loop></audio>

  <script src="script.js"></script>
</body>
</html>
